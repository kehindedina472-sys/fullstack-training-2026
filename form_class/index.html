<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration form</title>
    <link rel="stylesheet" href="style.css">
    </head>
    <body>
    <h1> GSTC Registration form</h1>
  
    <form class="form-container" id="registrationForm">

    <!-- first name, last name, dob, email, gender, phone number, address, ext contact info, account type, id card type, id number, password
    1. personal details, 2. account information -->
    
    <div class="personal-information">
    
    <h1 class="section-title">personal Details</h1> 

    <div class="form-group">
        <input type="text" id="firstName" placeholder="First name">
        <input type="text" id="LastName" placeholder="Last name">

        <select id="gender">
          <option>Select Gender</option>
         <option value="MALE">male</option>
         <option value="FEMALE"> female</option>
        </select>

         <input type="tel" id="phoneNumber" placeholder="phone number">
         <input type="date" id="dob" placeholder="Date of birth">
         <textarea id="address" cols="60" rows="3" placeholder="address"></textarea>
         </div>
    </div>

    <div class="external-information-section">

      <h1 class="section-title">External Details</h1>
      <div class="form-group">
         <input type="text" id="extFirstName" placeholder="First name">
         <input type="text" id="extLastName" placeholder="Last name">
         <input type="tel" id="extPhoneNumber" placeholder=" external phone number">
         <input type="email" id="extEmail" placeholder="external email address">
      </div>

    </div>

    <div class="account-section">

      <h1> Account information</h1>
      <div class="form-group">
        <label> Account Type </label>
        <select id="accountType"> 
          <option value="current">Current</option>
          <option value="savings">Savings</option>
          <option value="Domicial">Domicial</option>
        </select>
      </div>

      <div class="form-group">
        <label>ID Type</label>
        <select id="idType"> 
          <option value="nepa bil">Nepa bill</option>
          <option value="VOTERS CARD">Voters Card</option>
          <option value="NIN">NIN</option>
          <option value="INTERNATIONAL">International passport</option>
          <option value="OTHERS">Others</option>
        </select>
    </div>
    </div>

    <div class="password-section" >
      <h5 class="hide"> Enter password here</h5>
      <div class="form-group">
      <input type="password" id="password" placeholder="password">
      <input type="password" id="confirmPassword" placeholder="Re-enter password">
      </div>

    </div>
    <button class="button"> submit</button>

    </form>
  
    <div id="output" class="output-section"></div>
    <script src="script.js"></script>

</body>
</html>
