<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration form</title>
    <link rel="stylesheet" href="index.css">
    
    <h1> GSTC Registration form</h1>

    <form class="form-container">

    <!-- first name, last name, dob, email, gender, phone number, address, ext contact info, account type, id card type, id number, password
    1. personal details, 2. account information -->
    
    <div class="personal-information">
    
        <input type="text" placeholder="First name">
        <input type="text" placeholder="Last name">

        <select>
         <option value="MALE">male</option>
         <option value="FEMALE"> female</option>
        </select>

         <input type="tel" placeholder="phone number">
         <input type="date" placeholder="Date of birth">
         <textarea cols="30" rows="3" placeholder="address"></textarea>
    </div>

    <div class="external-information-section">
         <input type="text" placeholder="First name">
         <input type="text" placeholder="Last name">
         <input type="tel" placeholder=" external phone number">
         <input type="email" placeholder="external email address">
    </div>

    <div class="account-section">
        <label> Account Type </label>
        <select> 
          <option value="1">Current</option>
          <option value="2">Savings</option>
          <option value="3">Domicial</option>
        </select>

        <label>ID Type</label>
        <select> 
          <option value="1">Nepa bill</option>
          <option value="2">Voters Card</option>
          <option value="3">NIN</option>
          <option value="4">International passport</option>
          <option value="5">Others</option>
        </select>
    </div>

    <div class="password-section">
      <input type="password" placeholder="password">
      <input type="password" placeholder="Re enterpassword">

    </div>




    </form>
    
</head>
<body>
    
</body>
</html>
